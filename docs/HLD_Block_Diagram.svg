<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <style>
    .box { fill:#ffffff; stroke:#2b6cb0; stroke-width:2; rx:8; }
    .smallbox { fill:#f7fafc; stroke:#4a5568; stroke-width:1.5; rx:6; }
    .title { font: bold 18px sans-serif; fill:#2d3748 }
    .label { font: 14px sans-serif; fill:#2d3748 }
    .muted { font: 12px sans-serif; fill:#4a5568 }
    .llm { fill:#fff7ed; stroke:#dd6b20; stroke-width:2; rx:8 }
    .arrow { stroke:#2d3748; stroke-width:2; marker-end: url(#arrowhead); }
    .note { font: 12px sans-serif; fill:#2d3748 }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="40" class="title">SwiftMigrate - High Level Diagram (seema_Analyzer)</text>

  <!-- Frontend box -->
  <rect x="40" y="80" width="260" height="120" class="box" />
  <text x="60" y="110" class="label">Frontend (React)</text>
  <text x="60" y="132" class="muted">/upload UI (Upload.tsx)</text>
  <text x="60" y="152" class="muted">Sockets for progress</text>
  <text x="60" y="172" class="muted">Calls: POST /upload, POST /process-project</text>

  <!-- Backend box -->
  <rect x="420" y="40" width="360" height="240" class="box" />
  <text x="440" y="70" class="label">Backend (Node / Express)</text>
  <text x="440" y="92" class="muted">Entry: backend/server.js</text>

  <!-- Endpoints inside backend -->
  <rect x="450" y="110" width="140" height="40" class="smallbox" />
  <text x="460" y="135" class="label">POST /upload</text>
  <rect x="610" y="110" width="170" height="40" class="smallbox" />
  <text x="620" y="135" class="label">POST /process-project</text>
  <rect x="520" y="160" width="170" height="40" class="smallbox" />
  <text x="535" y="185" class="label">GET /download/:zipName</text>
  <rect x="520" y="210" width="170" height="40" class="smallbox" />
  <text x="535" y="235" class="label">GET /report (Allure)</text>

  <!-- Arrow from frontend to backend /upload -->
  <line x1="300" y1="140" x2="450" y2="130" class="arrow" />

  <!-- Upload service -->
  <rect x="420" y="310" width="360" height="140" class="box" />
  <text x="440" y="340" class="label">Upload and Analysis Services</text>
  <text x="440" y="362" class="muted">- services/uploadService.js (handleZip)</text>
  <text x="440" y="382" class="muted">- dependencyExtractor.js</text>
  <text x="440" y="402" class="muted">- utils/fileAnalyzer.js (classify/mapTests)</text>
  <text x="440" y="422" class="muted">Outputs: dependencyGraph, methodContentMap</text>

  <!-- Arrow from /upload endpoint to upload services -->
  <line x1="560" y1="150" x2="560" y2="310" class="arrow" />

  <!-- Dependency Resolver -->
  <rect x="820" y="310" width="320" height="140" class="box" />
  <text x="840" y="340" class="label">Dependency Resolver</text>
  <text x="840" y="362" class="muted">- buildDependencyGraphWithUtil()</text>
  <text x="840" y="382" class="muted">- topoSortWithBuckets()</text>
  <text x="840" y="402" class="muted">- buildContext()</text>

  <!-- Arrow between upload services and dependency resolver -->
  <line x1="780" y1="370" x2="820" y2="370" class="arrow" />

  <!-- Conversion Orchestrator box (central) -->
  <rect x="240" y="490" width="720" height="260" class="box" />
  <text x="260" y="520" class="label">Conversion Orchestrator</text>
  <text x="260" y="542" class="muted">- services/conversionOrchestrator.js (processFiles)</text>
  <text x="260" y="562" class="muted">- Uses buildContext, preprocess, AccuracyPipeline, CriticAgent</text>

  <!-- Generator LLM box -->
  <rect x="280" y="600" width="220" height="90" class="llm" />
  <text x="300" y="630" class="label">Generator LLM</text>
  <text x="300" y="650" class="muted">convertWithAI()</text>
  <text x="300" y="670" class="muted">Produces Playwright TypeScript code</text>

  <!-- Critic LLM box -->
  <rect x="700" y="600" width="220" height="90" class="llm" />
  <text x="720" y="630" class="label">Critic LLM</text>
  <text x="720" y="650" class="muted">CriticAgent.analyze()</text>
  <text x="720" y="670" class="muted">Approves or returns feedback</text>

  <!-- Arrows from conversion orchestrator to LLMs -->
  <line x1="560" y1="610" x2="500" y2="610" class="arrow" />
  <line x1="560" y1="610" x2="700" y2="610" class="arrow" />

  <!-- AccuracyPipeline near orchestrator -->
  <rect x="520" y="520" width="200" height="60" class="smallbox" />
  <text x="535" y="550" class="label">AccuracyPipeline</text>
  <text x="535" y="568" class="muted">AST-based validation</text>
  <line x1="620" y1="520" x2="620" y2="600" class="arrow" />

  <!-- Project Builder & Execution boxes -->
  <rect x="240" y="780" width="300" height="80" class="box" />
  <text x="260" y="810" class="label">Project Builder</text>
  <text x="260" y="832" class="muted">- services/projectBuilder.js (buildProject)</text>

  <rect x="660" y="780" width="300" height="80" class="box" />
  <text x="680" y="810" class="label">Execution Service</text>
  <text x="680" y="832" class="muted">- services/executionService.js (executeProject)</text>
  <text x="680" y="852" class="muted">npm install, npx playwright test, Allure</text>

  <!-- Arrows from orchestrator to project builder and execution -->
  <line x1="560" y1="740" x2="400" y2="780" class="arrow" />
  <line x1="560" y1="740" x2="760" y2="780" class="arrow" />

  <!-- Zips and Outputs -->
  <rect x="1020" y="40" width="140" height="80" class="box" />
  <text x="1036" y="70" class="label">Outputs</text>
  <text x="1036" y="90" class="muted">/download/:zipName</text>
  <text x="1036" y="110" class="muted">/report (Allure)</text>

  <line x1="960" y1="820" x2="1036" y2="120" class="arrow" />

  <!-- Notes -->
  <rect x="40" y="600" width="160" height="150" class="smallbox" />
  <text x="52" y="630" class="label">LLM Controls</text>
  <text x="52" y="652" class="muted">- Generator: maxAttempts=3</text>
  <text x="52" y="672" class="muted">- Bottleneck rate-limit (minTime ~5s)</text>
  <text x="52" y="692" class="muted">- Token tracking: totalTokenUsed</text>
  <text x="52" y="712" class="muted">- Critic: approves or gives feedback</text>

  <!-- Footer -->
  <text x="40" y="880" class="muted">Generated diagram: HLD block diagram showing main components and two LLM roles (Generator & Critic). Branch: seema_Analyzer</text>
</svg>
